org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Windows: aynı anda birden fazla Gradle görevi classes.dex üzerinde dosya kilidine takılabiliyor.
org.gradle.parallel=false

# Gradle daemon bazı ortamlarda Eclipse Adoptium java.exe için CreateProcess error=5 (Erişim engellendi)
# üretebiliyor; Android Studio JBR ile genelde sorun kalkar. Yolu kendi kurulumunuza göre güncelleyin.
org.gradle.java.home=C:/Program Files/Android/Android Studio/jbr
